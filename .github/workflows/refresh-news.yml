name: Refresh News Feed

on:
  workflow_dispatch:
  schedule:
    - cron: "21 12 * * 1"

permissions:
  contents: write

jobs:
  refresh-news:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Refresh article feed data
        run: python3 scripts/refresh_news.py

      - name: Commit updated feed data
        run: |
          if git diff --quiet -- data/news.json; then
            echo "No news feed changes detected."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/news.json
          git commit -m "Refresh news feed data"
          git push
